{% load socialaccount %}
<!-- Brutalist Slide-Out Auth Panel -->
<style>
    .auth-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 9998;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s var(--ease-reveal), visibility 0.4s var(--ease-reveal);
    }

    .auth-overlay.active {
        opacity: 1;
        visibility: visible;
    }

    .auth-panel {
        position: fixed;
        top: 0;
        right: -100%;
        width: 100%;
        max-width: 480px;
        height: 100vh;
        background: #f2f2f2;
        color: #111111;
        z-index: 9999;
        box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        transition: right 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        overflow-y: auto;
    }

    .auth-panel.active {
        right: 0;
    }

    /* Dark mode adjustments - strictly maintaining contrast */
    body.dark-mode .auth-panel {
        background: #111111;
        color: #f2f2f2;
        border-left: 2px solid #333;
    }

    .auth-header {
        padding: 40px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .auth-title {
        font-family: 'Clash Display', sans-serif;
        font-size: 48px;
        font-weight: 700;
        line-height: 0.9;
        text-transform: uppercase;
        margin-bottom: 8px;
    }

    .auth-subtitle {
        font-family: 'Satoshi', sans-serif;
        font-size: 16px;
        font-weight: 500;
        color: #555;
    }

    body.dark-mode .auth-subtitle {
        color: #aaa;
    }

    .auth-close {
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #111111;
        transition: transform 0.3s ease;
    }
    
    body.dark-mode .auth-close {
        color: #f2f2f2;
    }

    .auth-close:hover {
        transform: rotate(90deg);
    }

    .auth-content {
        padding: 0 40px 40px 40px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }

    .auth-form-container {
        display: none;
        animation: fadeIn 0.4s ease forwards;
    }

    .auth-form-container.active {
        display: block;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 32px;
        margin-top: 20px;
    }

    .auth-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .auth-label {
        font-family: 'Satoshi', sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .auth-input {
        background: transparent;
        border: none;
        border-bottom: 2px solid #111111;
        border-radius: 0;
        padding: 8px 0;
        font-family: 'Satoshi', sans-serif;
        font-size: 18px;
        color: #111111;
        outline: none;
        transition: border-color 0.3s ease;
    }

    body.dark-mode .auth-input {
        color: #f2f2f2;
        border-bottom: 2px solid #f2f2f2;
    }

    .auth-input:focus {
        border-bottom: 4px solid #111111;
    }
    
    body.dark-mode .auth-input:focus {
        border-bottom: 4px solid #f2f2f2;
    }

    .auth-submit {
        background: #111111;
        color: #f2f2f2;
        font-family: 'Clash Display', sans-serif;
        font-size: 24px;
        font-weight: 700;
        text-transform: uppercase;
        padding: 24px;
        border: none;
        cursor: pointer;
        width: 100%;
        margin-top: 16px;
        transition: transform 0.2s ease, background 0.3s ease;
    }

    body.dark-mode .auth-submit {
        background: #f2f2f2;
        color: #111111;
    }

    .auth-submit:hover {
        transform: translateY(-2px);
    }
    
    .auth-submit:active {
        transform: translateY(0);
    }

    .btn-google {
        display: block;
        width: 100%;
        padding: 16px;
        background: #ffffff;
        color: #111111;
        font-family: 'Clash Display', sans-serif;
        font-size: 20px;
        font-weight: 700;
        text-transform: uppercase;
        text-align: center;
        border: 3px solid #111111;
        cursor: pointer;
        margin-bottom: 24px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        text-decoration: none;
        box-shadow: 4px 4px 0px #111111;
    }

    body.dark-mode .btn-google {
        background: #111111;
        color: #f2f2f2;
        border-color: #f2f2f2;
        box-shadow: 4px 4px 0px #f2f2f2;
    }

    .btn-google:active {
        transform: translate(4px, 4px);
        box-shadow: 0px 0px 0px transparent;
    }
    
    .social-divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin-bottom: 24px;
        color: #555;
        font-family: 'Satoshi', sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
    }
    .social-divider::before,
    .social-divider::after {
        content: '';
        flex: 1;
        border-bottom: 2px solid #ddd;
    }
    body.dark-mode .social-divider::before,
    body.dark-mode .social-divider::after {
        border-bottom-color: #333;
    }
    .social-divider:not(:empty)::before {
        margin-right: .25em;
    }
    .social-divider:not(:empty)::after {
        margin-left: .25em;
    }


    .auth-toggle {
        margin-top: auto;
        padding-top: 40px;
        text-align: center;
        font-family: 'Satoshi', sans-serif;
        font-size: 15px;
        font-weight: 500;
    }

    .auth-toggle button {
        background: none;
        border: none;
        font-family: 'Satoshi', sans-serif;
        font-size: 15px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        text-decoration: underline;
        text-underline-offset: 4px;
        cursor: pointer;
        color: #111111;
        margin-left: 8px;
    }
    
    body.dark-mode .auth-toggle button {
        color: #f2f2f2;
    }

    .auth-error {
        color: #d93025;
        font-family: 'Satoshi', sans-serif;
        font-size: 14px;
        font-weight: 700;
        padding: 12px;
        border: 2px solid #d93025;
        margin-bottom: 24px;
        background: rgba(217, 48, 37, 0.05);
    }

    .auth-tease-msg {
        background: #111111;
        color: #f2f2f2;
        padding: 16px;
        font-family: 'Clash Display', sans-serif;
        font-size: 20px;
        text-align: center;
        margin-bottom: 24px;
        display: none;
    }
    
    body.dark-mode .auth-tease-msg {
        background: #f2f2f2;
        color: #111111;
    }
</style>

<div class="auth-overlay" id="authOverlay"></div>
<div class="auth-panel" id="authPanel">
    <div class="auth-header">
        <div>
            <h2 class="auth-title" id="authTitle">Join Anuvad</h2>
            <p class="auth-subtitle" id="authSubtitle">Create an account to save your library.</p>
        </div>
        <button class="auth-close" id="authClose" aria-label="Close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <div class="auth-content">
        <div id="authTeaseMsg" class="auth-tease-msg">
            SAVE YOUR PROGRESS TO CONTINUE
        </div>

        {% if auth_error %}
        <div class="auth-error">
            {{ auth_error }}
        </div>
        {% endif %}


        <!-- Google Auth -->
        <form action="{% provider_login_url 'google' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="btn-google">Continue with Google</button>
        </form>
        
        <div class="social-divider">OR</div>

        <!-- Register Form -->
        <div class="auth-form-container" id="registerFormContainer">
            <form class="auth-form" action="{% url 'register_user' %}" method="POST">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.path }}">
                
                <div class="auth-field">
                    <label class="auth-label" for="reg_username">Username</label>
                    <input class="auth-input" type="text" id="reg_username" name="username" required autocomplete="username">
                </div>
                
                <div class="auth-field">
                    <label class="auth-label" for="reg_email">Email</label>
                    <input class="auth-input" type="email" id="reg_email" name="email" required autocomplete="email">
                </div>
                
                <div class="auth-field">
                    <label class="auth-label" for="reg_password">Password</label>
                    <input class="auth-input" type="password" id="reg_password" name="password" required autocomplete="new-password">
                </div>
                
                <div class="auth-field">
                    <label class="auth-label" for="reg_confirm_password">Confirm Password</label>
                    <input class="auth-input" type="password" id="reg_confirm_password" name="confirm_password" required autocomplete="new-password">
                </div>

                <button type="submit" class="auth-submit">Register</button>
            </form>
        </div>

        <!-- Login Form -->
        <div class="auth-form-container" id="loginFormContainer">
            <form class="auth-form" action="{% url 'login_user' %}" method="POST">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.path }}">
                
                <div class="auth-field">
                    <label class="auth-label" for="login_username">Username</label>
                    <input class="auth-input" type="text" id="login_username" name="username" required autocomplete="username">
                </div>
                
                <div class="auth-field">
                    <label class="auth-label" for="login_password">Password</label>
                    <input class="auth-input" type="password" id="login_password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="auth-submit">Log In</button>
            </form>
        </div>

        <div class="auth-toggle">
            <span id="authToggleText">Already have an account?</span>
            <button type="button" id="authToggleBtn">Log In</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const overlay = document.getElementById('authOverlay');
        const panel = document.getElementById('authPanel');
        const closeBtn = document.getElementById('authClose');
        
        const registerContainer = document.getElementById('registerFormContainer');
        const loginContainer = document.getElementById('loginFormContainer');
        
        const title = document.getElementById('authTitle');
        const subtitle = document.getElementById('authSubtitle');
        const toggleText = document.getElementById('authToggleText');
        const toggleBtn = document.getElementById('authToggleBtn');
        const teaseMsg = document.getElementById('authTeaseMsg');

        let isLogin = false; // Default state

        // Initialize state based on server auth_action (if any)
        const serverAuthAction = "{{ auth_action|default:'register' }}";
        if (serverAuthAction === 'login') {
            setLoginState();
        } else {
            setRegisterState();
        }

        // Open if there's an error
        const hasError = "{{ auth_error|default:'' }}" !== "";
        if (hasError) {
            openAuthPanel();
        }

        function setLoginState() {
            isLogin = true;
            registerContainer.classList.remove('active');
            loginContainer.classList.add('active');
            title.textContent = "Welcome Back";
            subtitle.textContent = "Log in to access your library.";
            toggleText.textContent = "Don't have an account?";
            toggleBtn.textContent = "Register";
        }

        function setRegisterState() {
            isLogin = false;
            loginContainer.classList.remove('active');
            registerContainer.classList.add('active');
            title.textContent = "Join Anuvad";
            subtitle.textContent = "Create an account to save your library.";
            toggleText.textContent = "Already have an account?";
            toggleBtn.textContent = "Log In";
        }

        toggleBtn.addEventListener('click', () => {
            if (isLogin) {
                setRegisterState();
            } else {
                setLoginState();
            }
        });

        function openAuthPanel(customMessage = null) {
            overlay.classList.add('active');
            panel.classList.add('active');
            if (customMessage) {
                teaseMsg.style.display = 'block';
                teaseMsg.textContent = customMessage;
            } else {
                teaseMsg.style.display = 'none';
            }
        }

        function closeAuthPanel() {
            // Block closing if tease is enforced
            if (window.authTeaseEnforced) return;
            
            overlay.classList.remove('active');
            panel.classList.remove('active');
            
            const readerContainer = document.querySelector('.reader-container');
            if (readerContainer) {
                readerContainer.style.filter = 'none';
            }
        }

        closeBtn.addEventListener('click', closeAuthPanel);
        overlay.addEventListener('click', () => {
            if (!window.authTeaseEnforced) closeAuthPanel();
        });

        // Expose openAuthPanel globally so other scripts can trigger it
        window.openAuthPanel = openAuthPanel;
        window.closeAuthPanel = closeAuthPanel;
    });
</script>
