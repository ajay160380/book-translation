{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Anuvad-AI</title>
    <style>
        :root {
            --bg: #e6e6e6;
            --fg: #111111;
            --ff-display: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--ff-display);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background: #ffffff;
            border: 4px solid var(--fg);
            padding: 60px 40px;
            box-shadow: 12px 12px 0px var(--fg);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .login-container h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .login-container p {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 40px;
            color: #555;
        }

        .btn-google {
            display: block;
            width: 100%;
            padding: 20px;
            background: var(--fg);
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .btn-google:hover {
            background: #333333;
            transform: translate(-4px, -4px);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        
        .btn-google:active {
            transform: translate(0, 0);
            box-shadow: none;
        }
        
        /* Modern AllAuth requires POST for security */
        .socialaccount_providers form {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Anuvad AI</h1>
        <p>Login to continue</p>
        
        <div class="socialaccount_providers">
            <form action="{% provider_login_url 'google' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn-google">Continue with Google</button>
            </form>
        </div>
    </div>

</body>
</html>
